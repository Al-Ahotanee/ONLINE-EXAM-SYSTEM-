<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#1e1b4b"/>
  <title>GSS Gadau — Exam Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,300;9..144,700;9..144,900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Plus Jakarta Sans","sans-serif"], serif: ["Fraunces","serif"] },
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b' },
            accent: { 400:'#fbbf24',500:'#f59e0b',600:'#d97706' }
          },
          boxShadow: {
            'card': '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(30,27,75,.06)',
            'card-lg': '0 4px 6px rgba(0,0,0,.05),0 10px 30px rgba(30,27,75,.1)',
            'sidebar': '4px 0 24px rgba(0,0,0,.15)'
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;background:#f0f2ff}
    #root{min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#f1f5f9}
    ::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:99px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes pulse-dot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
    @keyframes slide-in{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    .animate-fadeup{animation:fadeUp .4s ease both}
    .animate-float{animation:float 4s ease-in-out infinite}
    .animate-spin-slow{animation:spin .7s linear infinite}
    .animate-slide-in{animation:slide-in .3s ease both}
    .spinner{width:20px;height:20px;border:2.5px solid #e0e7ff;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
    .spinner-lg{width:36px;height:36px;border-width:3px}
    table{border-collapse:collapse;width:100%}
    thead tr{background:#f8f7ff}
    th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#6b7280;white-space:nowrap}
    td{padding:13px 16px;border-top:1px solid #e0e7ff;font-size:13px;vertical-align:middle}
    tbody tr:hover{background:#faf9ff}
    .gradient-text{background:linear-gradient(135deg,#4338ca,#7c3aed,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .glass{background:rgba(255,255,255,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    @media(max-width:768px){.sidebar-open{transform:translateX(0)!important}.sidebar-closed{transform:translateX(-100%)!important}.main-pad{margin-left:0!important}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/App.jsx"></script>
</body>
</html>
